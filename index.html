<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Lavender Deobfuscator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;600;700;800;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            color: #e2e8f0;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0b0510;
        }
        body::before {
            content: "";
            position: fixed;
            top: -5%;
            left: -5%;
            width: 110vw;
            height: 110vh;
            background: url('baground.png') center/cover no-repeat;
            filter: blur(12px);
            z-index: -2;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 5, 25, 0.7);
            z-index: -1;
        }
        #splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 5, 20, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: pointer;
            transition: opacity 0.5s ease;
            padding: 20px;
        }
        #splash h1 {
            font-family: 'Audiowide', cursive;
            font-size: 3.8rem;
            color: #c084fc;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 4px;
            text-align: center;
            text-shadow: 0 0 20px rgba(192, 132, 252, 0.6), 0 0 60px rgba(192, 132, 252, 0.3), 0 0 100px rgba(192, 132, 252, 0.15);
            animation: glowPulse 2.5s ease-in-out infinite;
        }
        @keyframes glowPulse {
            0%,
            100% {
                text-shadow: 0 0 20px rgba(192, 132, 252, 0.6), 0 0 60px rgba(192, 132, 252, 0.3), 0 0 100px rgba(192, 132, 252, 0.15);
            }
            50% {
                text-shadow: 0 0 30px rgba(244, 114, 182, 0.8), 0 0 80px rgba(244, 114, 182, 0.4), 0 0 120px rgba(244, 114, 182, 0.2);
            }
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(244, 114, 182, 0.2);
            border-top: 4px solid #f472b6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        #splash p {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 300;
            color: #d8b4fe;
            animation: pulse 1.5s infinite;
            letter-spacing: 2px;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }
        #main-app {
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }
        .floating-nav {
            background: rgba(20, 10, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid #7e22ce;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            width: 100%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .nav-top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .brand-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .brand-section img {
            width: 45px;
            height: 45px;
            border-radius: 10px;
            object-fit: cover;
        }
        .brand-text h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 800;
            color: #c084fc;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(192, 132, 252, 0.3);
        }
        .brand-text span {
            font-family: 'Inter', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            color: #d8b4fe;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .audio-section {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(30, 15, 45, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            border: 1px solid #581c87;
        }
        .audio-section i {
            color: #c084fc;
            font-size: 0.9rem;
        }
        .audio-section input[type=range] {
            width: 80px;
            accent-color: #f472b6;
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
            background: transparent;
        }
        .nav-btn {
            padding: 10px 20px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #d8b4fe;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            letter-spacing: 0.5px;
        }
        .nav-btn:hover {
            color: #f472b6;
        }
        .nav-btn.active {
            color: #f472b6;
            background: rgba(244, 114, 182, 0.15);
        }
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .home-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 20px;
            margin-top: 20px;
        }
        .home-img {
            width: 250px;
            height: 250px;
            border-radius: 12px;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(192, 132, 252, 0.3);
        }
        .home-text h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.2rem;
            font-weight: 900;
            line-height: 1;
            margin-bottom: 20px;
            color: #c084fc;
            text-shadow: 0 0 10px rgba(192, 132, 252, 0.5);
            letter-spacing: 3px;
        }
        .home-text p {
            font-family: 'Inter', sans-serif;
            color: #e9d5ff;
            line-height: 1.7;
            font-size: 1.05rem;
            font-weight: 300;
            margin-bottom: 30px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .social-links {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 15px;
            background: rgba(30, 15, 45, 0.8);
            color: #c084fc;
            font-size: 1.8rem;
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid #7e22ce;
        }
        .social-btn:hover {
            background: #581c87;
            color: #f472b6;
            border-color: #f472b6;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(244, 114, 182, 0.3);
        }
        .tools-selection {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }
        .tool-card {
            flex: 1;
            background: rgba(20, 10, 30, 0.85);
            border: 1px solid #7e22ce;
            border-radius: 12px;
            padding: 14px 18px;
            cursor: pointer;
            transition: all 0.3s;
            backdrop-filter: blur(10px);
        }
        .tool-card:hover {
            border-color: #f472b6;
            background: rgba(40, 20, 60, 0.9);
            transform: translateY(-2px);
        }
        .tool-card.active {
            border-color: #f472b6;
            background: rgba(244, 114, 182, 0.1);
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.1);
        }
        .tool-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: #c084fc;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }
        .tool-card p {
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 300;
            color: #d8b4fe;
        }
        .workspace-box {
            background: rgba(20, 10, 30, 0.85);
            border: 1px solid #7e22ce;
            border-radius: 15px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .file-zone {
            border: 2px dashed #7e22ce;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
            background: rgba(10, 5, 20, 0.6);
        }
        .file-zone:hover,
        .file-zone.drag {
            border-color: #f472b6;
            background: rgba(244, 114, 182, 0.1);
        }
        .file-zone i {
            font-size: 2rem;
            color: #c084fc;
            margin-bottom: 10px;
        }
        .file-zone p {
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            font-weight: 300;
            color: #d8b4fe;
        }
        .editor-wrapper {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #7e22ce;
            margin-bottom: 20px;
            background: #1e1e1e;
        }
        .editor-wrapper .CodeMirror {
            height: 200px;
            font-family: 'Consolas', 'Menlo', monospace;
            font-size: 14px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        .editor-wrapper .CodeMirror-gutters {
            background: #1e1e1e;
            border-right: 1px solid #333;
        }
        .editor-wrapper .CodeMirror-linenumber {
            color: #858585;
        }
        .btn-process {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #9333ea, #7e22ce);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 1.5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4);
            position: relative;
            overflow: hidden;
        }
        .btn-process::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -60%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transform: rotate(25deg);
            animation: shimmer 3s infinite;
        }
        @keyframes shimmer {
            0% {
                transform: translateX(-100%) rotate(25deg);
            }
            100% {
                transform: translateX(100%) rotate(25deg);
            }
        }
        .btn-process:hover {
            background: linear-gradient(135deg, #c084fc, #9333ea);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(192, 132, 252, 0.6);
        }
        .btn-process:disabled {
            background: #4c1d95;
            color: #a855f7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .btn-process:disabled::after {
            animation: none;
        }
        .result-wrapper {
            margin-top: 25px;
            border-radius: 10px;
            border: 1px solid #7e22ce;
            overflow: hidden;
            background: #1e1e1e;
        }
        .result-header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 15px;
            background: rgba(10, 5, 20, 0.8);
            border-bottom: 1px solid #333;
            gap: 12px;
        }
        .result-header button {
            background: transparent;
            border: 1px solid #7e22ce;
            color: #d8b4fe;
            padding: 5px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .result-header button i {
            font-size: 0.9rem;
        }
        .result-header button:hover {
            background: #581c87;
            border-color: #f472b6;
            color: #f472b6;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(244, 114, 182, 0.3);
        }
        .result-header button:active {
            transform: scale(0.95);
        }
        .result-header button::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border-radius: 10px;
            background: linear-gradient(45deg, #f472b6, #c084fc, #f472b6);
            background-size: 300% 300%;
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s;
        }
        .result-header button:hover::before {
            opacity: 0.3;
            animation: neonBorder 2s ease infinite;
        }
        @keyframes neonBorder {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }
        .result-box {
            padding: 20px;
            min-height: 200px;
            max-height: 500px;
            overflow-y: auto;
            text-align: left;
            background: #1e1e1e;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.5);
            display: none;
        }
        .result-box pre {
            margin: 0;
            background: transparent !important;
        }
        .result-box code {
            font-family: 'Consolas', 'Menlo', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .result-box.show {
            display: block;
        }
        @media (max-width: 768px) {
            .tools-selection {
                flex-direction: column;
            }
            #splash h1 {
                font-size: 2.5rem;
                letter-spacing: 2px;
            }
            .home-text h1 {
                font-size: 2.8rem;
            }
            .brand-text h2 {
                font-size: 1rem;
            }
            .nav-btn {
                font-size: 0.75rem;
                padding: 8px 14px;
            }
            .nav-top-row {
                flex-wrap: wrap;
                gap: 12px;
            }
        }
        @media (max-width: 480px) {
            #splash h1 {
                font-size: 1.8rem;
            }
            .home-text h1 {
                font-size: 2.2rem;
            }
            .brand-text h2 {
                font-size: 0.85rem;
            }
            .nav-btn {
                font-size: 0.65rem;
                padding: 6px 10px;
            }
            .audio-section input[type=range] {
                width: 50px;
            }
            .result-header {
                flex-wrap: wrap;
                gap: 8px;
            }
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="http://j.top4top.io/m_3822pbsom1.mp3" type="audio/mpeg">
    </audio>

    <div id="main-app" style="display:block;opacity:1;">

        <div class="floating-nav">
            <div class="nav-top-row">
                <div class="brand-section">
                    <img src="https://i.ibb.co.com/gL6r4q6p/hinata.jpg" alt="Profile">
                    <div class="brand-text">
                        <h2>LAVENDER</h2>
                        <span>by pinoolavender</span>
                    </div>
                </div>
                <div class="audio-section">
                    <i class="fas fa-volume-up"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="50">
                </div>
            </div>
        </div>

        <div id="tab-alat" class="tab-content active">

            <div class="tools-selection">
                <div class="tool-card active" id="card-prometheus">
                    <h3>Deobfuscator Prometheus</h3>
                    <p>mengurangi obfuscation prometheus</p>
                </div>
            </div>

            <div class="workspace-box">
                <input type="file" id="fileInput" accept=".lua,.txt" style="display:none;">
                <div class="file-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <i class="fas fa-file-upload"></i>
                    <p id="fileLabel">Pilih file atau seret file .lua atau .txt ke sini</p>
                </div>

                <div class="editor-wrapper">
                    <textarea id="codeTextarea" placeholder="Tempelkan kode lua di sini..."></textarea>
                </div>

                <button id="btnProcess" class="btn-process">DEOBFUSCATOR PROMETHEUS</button>

                <div class="result-wrapper">
                    <div class="result-header">
                        <button onclick="copyResult()"><i class="fas fa-copy"></i> Copy</button>
                        <button onclick="downloadResult()"><i class="fas fa-download"></i> Download</button>
                    </div>
                    <div class="result-box" id="resultContainer">
                        <pre><code id="codeResult" class="language-lua"></code></pre>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/lua/lua.min.js">
    </script>

    <script>
        const currentTool = 'prometheus';
        let selectedFile = null;
        const bgMusic = document.getElementById('bgMusic');
        const volumeSlider = document.getElementById('volumeSlider');

        bgMusic.volume = volumeSlider.value / 100;

        volumeSlider.addEventListener('input', (e) => {
            bgMusic.volume = e.target.value / 100;
        });

        function enterApp() {}
        function switchTab() {}

 = document.getElementById('codeTextarea');
        const editor = CodeMirror.fromTextArea(textarea, {
            mode: 'lua',
            theme: 'monokai',
            lineNumbers: true,
            indentUnit: 4,
            tabSize: 4,
            matchBrackets: true,
            autoCloseBrackets: true,
            styleActiveLine: true,
        });
        editor.setSize(null, 200);

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileLabel = document.getElementById('fileLabel');

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag');
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag');
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });
        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            if (fileInput.files.length > 0) {
                selectedFile = fileInput.files[0];
                fileLabel.textContent = `File terpilih: ${selectedFile.name}`;
                const reader = new FileReader();
                reader.onload = (e) => {
                    editor.setValue(e.target.result);
                };
                reader.readAsText(selectedFile);
            }
        }

        document.getElementById('btnProcess').addEventListener('click', async () => {
            const btn = document.getElementById('btnProcess');
            const resultContainer = document.getElementById('resultContainer');
            const codeResult = document.getElementById('codeResult');

            let codeToProcess = editor.getValue().trim();

            if (!codeToProcess) {
                resultContainer.classList.add('show');
                codeResult.innerHTML = '<span style="color:#ef4444;">select file atau tempel</span>';
                return;
            }

            resultContainer.classList.add('show');
            codeResult.textContent = '';
            codeResult.className = 'language-lua';

            btn.disabled = true;
            btn.textContent = 'PROSES...';

            try {
                const response = await fetch('/api/deobfuscator', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: codeToProcess })
                });

                const data = await response.json();

                if (response.ok) {
                    const result = data.result || data.deobfuscated || '';
                    codeResult.textContent = result;
                    Prism.highlightElement(codeResult);
                } else {
                    codeResult.innerHTML = `<span style="color:#ef4444;">[!] error: ${data.error}</span>`;
                }
            } catch (e) {
                codeResult.innerHTML =
                    `<span style="color:#ef4444;">[!] server error: ${e.message}</span>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'DEOBFUSCATOR PROMETHEUS';
            }
        });

        function copyResult() {
            const codeEl = document.getElementById('codeResult');
            const text = codeEl.textContent;
            if (!text) {
                alert('tidak ada hasil untuk disalin');
                return;
            }
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(text).then(() => {
                    alert('salin sukses');
                }).catch(() => {
                    fallbackCopy(text);
                });
            } else {
                fallbackCopy(text);
            }
        }

        function fallbackCopy(text) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            document.body.appendChild(textarea);
            textarea.select();
            try {
                document.execCommand('copy');
                alert('salin sukses');
            } catch (e) {
                alert('gagal menyalin');
            }
            document.body.removeChild(textarea);
        }

        function downloadResult() {
            const codeEl = document.getElementById('codeResult');
            const text = codeEl.textContent;
            if (!text) {
                alert('Tidak ada hasil untuk diunduh');
                return;
            }
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'deobfuscated_result.lua';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
